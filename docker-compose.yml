version: "3.9"
services:
  db:
    container_name: project-noncon-db
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: project_noncon
      MYSQL_USER: project_user
      MYSQL_PASSWORD: project_pass
    ports:
      - "9906:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/conf.d/local.cnf:/etc/mysql/conf.d/local.cnf:ro
      - ./mysql-files:/var/lib/mysql-files:rw
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  php-apache-environment:
    container_name: project-noncon-app
    build:
      context: .
      dockerfile: DockerFile
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: project_noncon
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
    volumes:
      - ./php:/var/www/html
    ports:
      - "8080:80"
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8000:80"

  line-webhook:
    container_name: project-linebot
    build:
      context: ./Line-bot
      dockerfile: Dockerfile
    env_file:
      - ./Line-bot/.env.example
    environment:
      TZ: Asia/Bangkok
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "8100:8000"
    volumes:
      - linebot_data:/app/app/data

  cloudflare-tunnel:
    container_name: project-linebot-tunnel
    image: cloudflare/cloudflared:2024.11.0
    depends_on:
      - line-webhook
    command: tunnel --no-autoupdate --url http://line-webhook:8000
    restart: unless-stopped

volumes:
  db_data:
  linebot_data: